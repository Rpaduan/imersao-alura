<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <button id="theme-toggle" aria-label="Alternar entre modo claro e escuro">Modo Claro</button>
        <nav aria-label="Seleção de perfis">
            <ul class="profiles">
                <li class="profile">
                    <img src="assets/perfil-1.png" alt="Perfil 1">
                    <p>Renato</p>
                </li>
                <li class="profile">
                    <img src="assets/perfil-2.png" alt="Perfil 2">
                    <p>Jéssica</p>
                </li>
                <li class="profile">
                    <img src="assets/perfil-3.png" alt="Perfil 3">
                    <p>Alice</p>
                </li>
                <li class="profile">
                    <img src="assets/perfil-4.png" alt="Perfil 4">
                    <p>Nami</p>
                </li>
            </ul>
        </nav>
    </main>
    <script src="script.js"></script>
</body>
</html>
